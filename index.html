<!DOCTYPE html>
<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Figuritas Road to FIFA 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Trebuchet MS',sans-serif;background:#f0f2f5;color:#111;min-height:100vh;}
#header{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
#header-top{padding:10px 14px 6px;text-align:center;}
#header-top .sub{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.6);text-transform:uppercase;}
#header-top h1{font-size:16px;font-weight:900;}
#progress-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
#progress-bar-wrap{height:8px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;}
#progress-bar{height:100%;background:linear-gradient(90deg,#86efac,#34d399);border-radius:99px;transition:width .5s;width:0%;}
#progress-wrap{max-width:340px;margin:6px auto 2px;}
#sobre-wrap{padding:0 12px 8px;}
#sobre-btn{width:100%;padding:8px;border-radius:10px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-weight:700;font-size:13px;cursor:pointer;}
#sobre-box{background:rgba(255,255,255,.95);border-radius:10px;padding:10px;margin-top:6px;display:none;}
#sobre-hint{font-size:12px;color:#444;margin-bottom:6px;}
#sobre-input{width:100%;padding:8px;border-radius:8px;border:2px solid #1d4ed8;font-size:15px;color:#111;min-height:60px;resize:none;outline:none;font-family:monospace;font-weight:700;}
#sobre-ok{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:none;background:#1d4ed8;color:#fff;font-weight:800;font-size:15px;cursor:pointer;}
#sobre-msg{margin-top:8px;font-size:12px;color:#444;padding:6px 8px;background:#f0fdf4;border-radius:6px;border:1px solid #86efac;display:none;}
#nav{display:flex;border-top:1px solid rgba(255,255,255,.15);}
.nav-btn{flex:1;padding:10px 2px;background:transparent;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.5);font-size:11px;font-weight:700;cursor:pointer;}
.nav-btn.active{background:rgba(255,255,255,.15);border-bottom:3px solid #fff;color:#fff;}
#content{padding:12px;max-width:600px;margin:0 auto;}
#tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;scrollbar-width:none;}
#tabs::-webkit-scrollbar{display:none;}
.tab-btn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:2px solid #d1d5db;background:#fff;color:#555;font-weight:700;font-size:12px;cursor:pointer;}
.tab-btn.active{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
#search-input{width:100%;padding:11px 14px;border-radius:12px;border:2px solid #d1d5db;background:#fff;color:#111;font-size:14px;margin-bottom:10px;outline:none;font-weight:500;}
.card{background:#fff;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.08);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.card-title{font-weight:800;font-size:15px;color:#111;display:flex;align-items:center;gap:8px;}
.card-flag{font-size:24px;}
.card-count{font-size:14px;font-weight:800;color:#9ca3af;}
.card-count.done{color:#16a34a;}
.card-subtitle{font-size:11px;color:#9ca3af;}
.bar-wrap{height:6px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-bottom:10px;}
.bar-fill{height:100%;border-radius:99px;transition:width .4s;background:#16a34a;}
.fig-wrap{position:relative;display:inline-flex;flex-direction:column;align-items:center;}
.fig-rep-minus{position:absolute;top:-6px;left:-6px;width:20px;height:20px;border-radius:50%;background:#dc2626;border:none;color:#fff;font-size:13px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:2;line-height:1;}
.fig-rep-btn{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#f97316;border:none;color:#fff;font-size:13px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:2;line-height:1;}
.fig-rc{position:absolute;bottom:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#dc2626;color:#fff;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.figs{display:flex;flex-wrap:wrap;gap:6px;}
.fig-btn{width:58px;height:68px;border-radius:10px;background:#fff;border:2px solid #e5e7eb;color:#9ca3af;cursor:pointer;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.fig-btn.tiene{background:#dcfce7;border-color:#16a34a;color:#15803d;box-shadow:0 2px 8px rgba(22,163,74,.25);}
.fig-btn.flash{animation:flashAnim 0.4s ease;}
@keyframes flashAnim{0%{transform:scale(1);background:#dcfce7;}50%{transform:scale(1.2);background:#86efac;box-shadow:0 0 12px rgba(22,163,74,.6);}100%{transform:scale(1);background:#dcfce7;}}
.fig-btn .fig-num{font-size:16px;line-height:1;}
.fig-btn .fig-name{font-size:8px;color:#d1d5db;max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
.fig-btn.tiene .fig-name{color:#86efac;}
.falt-card{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);}
.falt-card-title{font-weight:800;font-size:14px;color:#111;margin-bottom:8px;}
.falt-chips{display:flex;flex-wrap:wrap;gap:6px;}
.falt-chip{padding:8px 10px;border-radius:10px;font-size:13px;font-weight:700;background:#fef2f2;border:2px solid #fca5a5;color:#dc2626;cursor:pointer;min-width:50px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.falt-chip .cn{font-size:15px;font-weight:900;line-height:1;}
.falt-chip .cname{font-size:9px;color:#9ca3af;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.falt-banner{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.08);border-left:5px solid #dc2626;}
.falt-banner h2{font-size:16px;font-weight:900;color:#dc2626;}
.falt-banner p{font-size:12px;color:#888;margin-top:2px;}
#filtros{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none;}
#filtros::-webkit-scrollbar{display:none;}
.filtro-btn{white-space:nowrap;padding:5px 12px;border-radius:20px;border:2px solid #d1d5db;background:#fff;color:#555;font-weight:700;font-size:11px;cursor:pointer;}
.filtro-btn.active{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
.rep-banner{background:#f5f3ff;border:2px solid #c4b5fd;border-radius:14px;padding:12px 14px;margin-bottom:14px;font-weight:800;font-size:15px;color:#7c3aed;}
.rep-row{background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.rep-info{}
.rep-name{font-size:14px;font-weight:700;color:#111;}
.rep-id{font-size:10px;color:#aaa;}
.rep-controls{display:flex;align-items:center;gap:8px;}
.rep-badge{background:#dc2626;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;}
.rep-minus{background:#fef2f2;border:2px solid #dc2626;color:#dc2626;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.rep-plus{background:#f0fdf4;border:2px solid #16a34a;color:#16a34a;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.empty{text-align:center;padding:48px 20px;color:#888;}
.empty .ei{font-size:44px;margin-bottom:12px;}
.empty h3{font-size:16px;font-weight:700;color:#444;}
.empty p{font-size:13px;margin-top:8px;line-height:1.7;}
.chip-btn{padding:6px 12px;border-radius:20px;font-size:13px;background:#fff;border:2px solid #e5e7eb;color:#555;cursor:pointer;font-weight:700;}
.chip-btn.tiene{background:#dcfce7;border-color:#16a34a;color:#15803d;}
</style>
</head>

  </div>
  <div id="sobre-wrap">

    <button id="sobre-btn" onclick="toggleSobre()" style="flex:1;padding:8px;border-radius:10px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-weight:700;font-size:13px;cursor:pointer">Abrir sobre nuevo</button>

  </div>
    <div id="sobre-box">
      <div id="sobre-hint">Escribi los codigos del sobre: Ej: ARG 17 ENG 5 BRA 14</div>

      <button id="sobre-ok" onclick="procesarSobre()">Marcar figuritas</button>
      <div id="sobre-msg"></div>
    </div>
  </div>
  <div id="nav">
    <button class="nav-btn" onclick="setVista('faltantes')" id="nav-faltantes">Faltan</button>
    <button class="nav-btn active" onclick="setVista('album')" id="nav-album">Album</button>
    <button class="nav-btn" onclick="setVista('repetidas')" id="nav-repetidas">Cambios</button>

    <button class="nav-btn" onclick="setVista('intercambio')" id="nav-intercambio">Cambiar</button>
  </div>
</div>

var col = JSON.parse(localStorage.getItem('p26_col') || 'null') || {};
var rep = JSON.parse(localStorage.getItem('p26_rep') || '{}');
var vista = 'album';
var secActiva = 'GRP_J';
var filtroGrupo = 'todos';
var sobreAbierto = false;

function save() {
  localStorage.setItem('p26_col', JSON.stringify(col));
  localStorage.setItem('p26_rep', JSON.stringify(rep));
}

function getAllFig() {
  var all = [];
  ESP.forEach(function(s) {
    s.fig.forEach(function(n, i) {
      // Extract number from name like "FWC 9" or "CC 1"
      var parts = n.split(' ');
      var num = parts.length >= 2 && !isNaN(parts[1]) ? parseInt(parts[1]) : (i+1);
      all.push({id: s.id+'_'+i, nombre: n, secId: s.id, secNombre: s.nombre, secEmoji: s.emoji, num: num, equipo: null});
    });
  });
  GRUPOS.forEach(function(g) {
    g.equipos.forEach(function(eq) {
      eq.jug.forEach(function(n, i) {
        all.push({id: eq.id+'_'+i, nombre: eq.id+' '+n, equipo: eq.id, eqNombre: eq.nombre, eqEmoji: eq.emoji, eqColor: eq.color, grupo: g.id, gNombre: g.nombre, gColor: g.color, num: i+1});
      });
    });
  });
  return all;
}

var ALL = getAllFig();
var TOTAL = ALL.length;

function stats() {
  var t = ALL.filter(function(f){return col[f.id];}).length;
  var p = Math.round(t/TOTAL*100);
  document.getElementById('lbl-tengo').textContent = t + ' tengo';
  document.getElementById('lbl-pct').textContent = p + '%';
  document.getElementById('lbl-faltan').textContent = (TOTAL-t) + ' faltan';
  document.getElementById('progress-bar').style.width = p + '%';
  var tr = Object.values(rep).reduce(function(a,b){return a+b;}, 0);
  document.getElementById('nav-faltantes').textContent = 'Faltan (' + ALL.filter(function(f){return !col[f.id];}).length + ')';
  document.getElementById('nav-repetidas').textContent = tr > 0 ? 'Cambios ('+tr+')' : 'Cambios';
}

var ultimaAccion = null;

function tog(id) {
  // Save undo state
  ultimaAccion = {id: id, valor: col[id] || false};
  col[id] = !col[id];
  if(navigator.vibrate) navigator.vibrate(50);
  save(); render(); stats();
  // Flash animation on the button
  if(col[id]) {
    setTimeout(function() {
      var btn = document.querySelector('.fig-btn[data-id="'+id+'"]');
      if(btn) {
        btn.classList.add('flash');
        setTimeout(function(){btn.classList.remove('flash');}, 400);
      }
    }, 10);
  }
}

function deshacerUltima() {
  if(!ultimaAccion) { alert('Nada para deshacer'); return; }
  col[ultimaAccion.id] = ultimaAccion.valor;
  ultimaAccion = null;
  save(); render(); stats();
}
function addR(id) { rep[id] = (rep[id]||0)+1; save(); render(); stats(); }
function rmR(id) { if((rep[id]||0)<=1) delete rep[id]; else rep[id]--; save(); render(); stats(); }

function setVista(v) {
  vista = v;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('nav-'+v).classList.add('active');
  render();
}

function setSec(id) { secActiva = id; render(); }
function setFiltro(k) { filtroGrupo = k; render(); }

function render() {
  var c = document.getElementById('content');
  if(vista === 'faltantes') c.innerHTML = renderFaltantes();
  else if(vista === 'album') c.innerHTML = renderAlbum();
  else if(vista === 'exportar') c.innerHTML = renderExportar();
  else if(vista === 'intercambio') c.innerHTML = renderIntercambio();
  else c.innerHTML = renderRepetidas();
  bindEvents();
}

function figCard(id, num, name, tiene, rc) {
  if(tiene) {
    var minus = rc > 0 ? '<button class="fig-rep-minus" data-rmr="'+id+'" title="Quitar repetida">-</button>' : '';
    return '<div class="fig-wrap"><button class="fig-btn tiene" data-id="'+id+'"><span class="fig-num">'+num+'</span><span class="fig-name">'+name+'</span></button><button class="fig-rep-btn" data-rep="'+id+'">+</button>'+minus+(rc>0?'<div class="fig-rc">'+rc+'</div>':'')+'</div>';
  }
  return '<div class="fig-wrap"><button class="fig-btn" data-id="'+id+'"><span class="fig-num">'+num+'</span><span class="fig-name">'+name+'</span></button></div>';
}

function renderEsp(sec) {
  var t = sec.fig.filter(function(_,i){return col[sec.id+'_'+i];}).length;
  var p = Math.round(t/sec.fig.length*100);
  var btns = '';
  sec.fig.forEach(function(n,i) {
    var id = sec.id+'_'+i;
    var parts = n.split(' ');
    var num = parts.length >= 2 && !isNaN(parts[1]) ? parts[0]+' '+parts[1] : n;
    btns += figCard(id, num, '', col[id], rep[id]||0);
  });
  return '<div class="card"><div class="card-header"><div class="card-title">'+sec.emoji+' '+sec.nombre+'</div><div class="card-count'+(t===sec.fig.length?' done':'')+'">'+t+'/'+sec.fig.length+'</div></div><div class="bar-wrap"><div class="bar-fill" style="width:'+p+'%"></div></div><div class="figs">'+btns+'</div></div>';
}

function renderEq(eq) {
  var t = eq.jug.filter(function(_,i){return col[eq.id+'_'+i];}).length;
  var p = Math.round(t/eq.jug.length*100);
  var btns = '';
  eq.jug.forEach(function(n,i) {
    var id = eq.id+'_'+i;
    var name = n.split(' ').slice(1).join(' ') || '';
    btns += figCard(id, i+1, name, col[id], rep[id]||0);
  });
  return '<div class="card" style="border-left:5px solid '+eq.color+'"><div class="card-header"><div class="card-title"><span class="card-flag">'+eq.emoji+'</span><div><div style="font-size:16px">'+eq.nombre+'</div><div class="card-subtitle">'+t+' de '+eq.jug.length+' pegadas</div></div></div><div class="card-count'+(t===eq.jug.length?' done':'')+'">'+Math.round(p)+'%</div></div><div class="bar-wrap"><div class="bar-fill" style="width:'+p+'%;background:'+eq.color+'"></div></div><div class="figs">'+btns+'</div></div>';
}

function renderAlbum() {
  var tabs = '<div id="tabs">';
  tabs += '<button class="tab-btn'+(secActiva==='TODO'?' active':'')+'" onclick="setSec(\'TODO\')">Ver todo</button>';
  ESP.forEach(function(s) {
    tabs += '<button class="tab-btn'+(secActiva===s.id?' active':'')+'" onclick="setSec(\''+s.id+'\')">'+s.emoji+' '+s.nombre.split(' ').slice(0,2).join(' ')+'</button>';
  });
  GRUPOS.forEach(function(g) {
    tabs += '<button class="tab-btn'+(secActiva===g.id?' active':'')+'" onclick="setSec(\''+g.id+'\')">'+g.nombre+'</button>';
  });
  tabs += '</div>';
  var sec = '';
  if(secActiva === 'TODO') {
    ESP.forEach(function(s){sec += renderEsp(s);});
    GRUPOS.forEach(function(g){g.equipos.forEach(function(eq){sec += renderEq(eq);});});
  } else {
    var ae = ESP.find(function(s){return s.id===secActiva;});
    var ag = GRUPOS.find(function(g){return g.id===secActiva;});
    if(ae) sec = renderEsp(ae);
    else if(ag) ag.equipos.forEach(function(eq){sec += renderEq(eq);});
  }
  return '<div style="display:flex;gap:6px;margin-bottom:10px"><input id="search-input" type="text" placeholder="Buscar equipo o jugador..." style="flex:1;padding:11px 14px;border-radius:12px;border:2px solid #d1d5db;background:#fff;color:#111;font-size:14px;outline:none;font-weight:500"><button id="search-btn" style="padding:11px 16px;border-radius:12px;border:none;background:#1d4ed8;color:#fff;font-weight:700;font-size:14px;cursor:pointer">Buscar</button></div>'+tabs+'<div id="sec-content">'+sec+'</div>';
}

function renderFaltantes() {
  var falt = ALL.filter(function(f){return !col[f.id];});
  var gs = {};
  falt.forEach(function(f) {
    var k = f.grupo||f.secId||'esp';
    var nb = f.gNombre||f.secNombre||'Especiales';
    var c = f.gColor||'#1d4ed8';
    if(!gs[k]) gs[k] = {k:k, nombre:nb, color:c, items:[]};
    gs[k].items.push(f);
  });
  var gList = Object.values(gs);
  var filtros = '<div id="filtros"><button class="filtro-btn'+(filtroGrupo==='todos'?' active':'')+'" onclick="setFiltro(\'todos\')">Todos</button>';
  gList.forEach(function(g) {
    filtros += '<button class="filtro-btn'+(filtroGrupo===g.k?' active':'')+'" onclick="setFiltro(\''+g.k+'\')">'+g.nombre+'</button>';
  });
  filtros += '</div>';
  var mostrar = filtroGrupo==='todos' ? gList : gList.filter(function(g){return g.k===filtroGrupo;});
  var cards = '';
  mostrar.forEach(function(g) {
    var chips = '';
    g.items.forEach(function(f) {
      var fcode = f.equipo ? f.equipo+' '+f.num : f.secId+' '+(f.num||'');
      var fname = f.nombre.replace(/^\S+ /,'').split(' ')[0]||'';
      chips += '<button class="falt-chip" data-id="'+f.id+'"><div class="cn">'+fcode+'</div><div class="cname">'+fname+'</div></button>';
    });
    cards += '<div class="falt-card" style="border-left:4px solid '+g.color+'"><div class="falt-card-title">'+g.nombre+' - <span style="color:#dc2626">'+g.items.length+' faltan</span></div><div class="falt-chips">'+chips+'</div></div>';
  });
  return '<div class="falt-banner"><h2>Te faltan '+falt.length+' figuritas</h2><p>Toca una para marcarla como pegada</p></div>'+filtros+cards;
}

function renderRepetidas() {
  var list = ALL.filter(function(f){return (rep[f.id]||0)>0;});
  var tot = Object.values(rep).reduce(function(a,b){return a+b;}, 0);
  if(!list.length) return '<div class="empty"><div class="ei">🔁</div><h3>Sin repetidas todavia</h3><p>Toca el boton + naranja sobre una figurita que ya tenes</p></div>';
  var rows = '<div class="rep-banner">🔁 '+tot+' figuritas para cambiar</div>';
  list.forEach(function(f) {
    rows += '<div class="rep-row"><div class="rep-info"><div class="rep-name">'+f.nombre+'</div><div class="rep-id">'+f.id+'</div></div><div class="rep-controls"><button class="rep-minus" onclick="rmR(\''+f.id+'\')">-</button><div class="rep-badge">'+rep[f.id]+'</div><button class="rep-plus" onclick="addR(\''+f.id+'\')">+</button></div></div>';
  });
  return rows;
}

function bindEvents() {
  var searchBtn = document.getElementById('search-btn');
  if(searchBtn) {
    searchBtn.addEventListener('click', function(){
      buscar(document.getElementById('search-input').value);
    });
  }
  var searchInput = document.getElementById('search-input');
  if(searchInput) {
    searchInput.addEventListener('keydown', function(e){
      if(e.key === 'Enter') buscar(searchInput.value);
    });
  }
  document.querySelectorAll('.fig-btn[data-id]').forEach(function(btn) {
    btn.addEventListener('click', function(){tog(btn.dataset.id);});
  });
  document.querySelectorAll('.fig-rep-btn[data-rep]').forEach(function(btn) {
    btn.addEventListener('click', function(e){e.stopPropagation(); addR(btn.dataset.rep);});
  });
  document.querySelectorAll('.fig-rep-minus[data-rmr]').forEach(function(btn) {
    btn.addEventListener('click', function(e){e.stopPropagation(); rmR(btn.dataset.rmr);});
  });
  document.querySelectorAll('.falt-chip[data-id]').forEach(function(btn) {

function buscar(q) {
  if(q.length < 2) {
    var sc = document.getElementById('sec-content');
    var tb = document.getElementById('tabs');
    var sr = document.getElementById('search-results');
    if(sc) sc.style.display = '';
    if(tb) tb.style.display = '';
    if(sr) sr.remove();
    return;
  }
  var ql = q.toLowerCase();

  // Check if search matches a team name - find best match
  var equipoMatch = null;
  GRUPOS.forEach(function(g) {
    g.equipos.forEach(function(eq) {
      var eqNombre = eq.nombre.toLowerCase();
      var eqId = eq.id.toLowerCase();
      // Only match if ID matches exactly or nombre starts with query (min 3 chars)
      if(eqId === ql || (ql.length >= 3 && eqNombre.indexOf(ql) === 0)) {
        equipoMatch = {grupoId: g.id, eqId: eq.id};
      }
    });
  });

  if(equipoMatch) {
    // Go directly to the group and scroll to team
    var sc = document.getElementById('sec-content');
    var tb = document.getElementById('tabs');
    var sr = document.getElementById('search-results');
    if(sc) sc.style.display = '';
    if(tb) tb.style.display = '';
    if(sr) sr.remove();
    document.getElementById('search-input').value = '';
    secActiva = equipoMatch.grupoId;
    render();
    // Scroll to the team card after render
    setTimeout(function() {
      var btns = document.querySelectorAll('.fig-btn[data-id]');
      if(btns.length > 0) {
        var firstBtn = null;
        btns.forEach(function(btn) {
          if(!firstBtn && btn.dataset.id.indexOf(equipoMatch.eqId+'_') === 0) {
            firstBtn = btn;
          }
        });
        if(firstBtn) firstBtn.closest('.card').scrollIntoView({behavior:'smooth'});
      }
    }, 150);
    return;
  }

  var res = ALL.filter(function(f){return f.nombre.toLowerCase().indexOf(ql)>=0 || f.id.toLowerCase().indexOf(ql)>=0 || (f.eqNombre||'').toLowerCase().indexOf(ql)>=0;});
  var chips = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">';
  res.forEach(function(f){
    chips += '<button class="chip-btn'+(col[f.id]?' tiene':'')+'" data-id="'+f.id+'">'+(col[f.id]?'✓ ':'')+f.nombre+'</button>';
  });
  chips += '</div>';
  var el = document.getElementById('search-results');
  if(!el) {
    el = document.createElement('div');
    el.id = 'search-results';
    var sc2 = document.getElementById('sec-content');
    sc2.parentNode.insertBefore(el, sc2);
  }
  el.innerHTML = '<div style="font-size:12px;color:#888;margin-bottom:4px">'+res.length+' resultados</div>'+chips;
  document.getElementById('sec-content').style.display = 'none';
  document.getElementById('tabs').style.display = 'none';
  el.querySelectorAll('.chip-btn[data-id]').forEach(function(btn){
    btn.addEventListener('click', function(){tog(btn.dataset.id);});
  });
}

function toggleSobre() {
  sobreAbierto = !sobreAbierto;
  document.getElementById('sobre-box').style.display = sobreAbierto ? 'block' : 'none';
  document.getElementById('sobre-btn').textContent = sobreAbierto ? 'Cerrar' : 'Abrir sobre nuevo';
}

function procesarSobre() {
  var input = document.getElementById('sobre-input').value.toUpperCase();
  var tokens = input.split(/[\s,;\n]+/).filter(function(t){return t.length>0;});
  var marcadas = [], noEnc = [];
  var i = 0;
  while(i < tokens.length) {
    var found = false;
    if(i+1 < tokens.length && !isNaN(tokens[i+1])) {
      var pfx = tokens[i], nm = parseInt(tokens[i+1]);
      var c;
      if(pfx === 'FWC') {
        if(nm >= 0 && nm <= 8) c = 'INTRO_'+nm;
        else if(nm >= 9 && nm <= 19) c = 'FWC_'+(nm-9);
        else c = pfx+'_'+nm;
      } else if(pfx === 'CC') {
        c = 'CC_'+(nm-1);
      } else {
        c = pfx+'_'+(nm-1);
      }
      if(ALL.find(function(f){return f.id===c;})) {
        if(!col[c]) col[c] = true; else rep[c] = (rep[c]||0)+1;
        marcadas.push(tokens[i]+' '+tokens[i+1]);
        i += 2; found = true;
      }
    }
    if(!found) { noEnc.push(tokens[i]); i++; }
  }
  save(); stats(); render();
  var msg = document.getElementById('sobre-msg');
  msg.style.display = 'block';
  if(marcadas.length > 0) {
    msg.textContent = 'OK: ' + marcadas.join(', ') + (noEnc.length ? ' | No encontre: '+noEnc.join(', ') : '');
  } else {
    msg.textContent = 'No encontre ninguna. Usa: ARG 17 ENG 5';
  }
  document.getElementById('sobre-input').value = '';
}

function getTextoFaltantes() {
  var falt = ALL.filter(function(f){return !col[f.id];});
  var gs = {};
  falt.forEach(function(f) {
    var k, prefijo, nombre, emoji, num;
    if(f.equipo) {
      // Regular team sticker
      k = f.equipo;
      prefijo = f.equipo;
      nombre = f.eqNombre;
      emoji = f.eqEmoji||'';
      num = f.num;
    } else {
      // Special section - extract code from nombre like "FWC 9", "CC 1", "FWC 0"
      var parts = f.nombre.split(' ');
      prefijo = parts[0];
      num = parts.length >= 2 ? parts[1] : String(f.num);
      k = f.secId;
      nombre = f.secNombre;
      emoji = f.secEmoji||'';
    }
    if(!gs[k]) gs[k] = {nombre:nombre, emoji:emoji, items:[], prefijo:prefijo};
    gs[k].items.push(num);
  });
  var txt = 'Figuritas App - Lista\n\nMe faltan\n';
  Object.values(gs).forEach(function(g) {
    if(g.items.length > 0) {
      txt += g.prefijo+' '+g.emoji+': '+g.items.join(', ')+'\n';
    }
  });
  txt += '\nTotal: '+falt.length+' figuritas';
  return txt;
}

}

function analizarIntercambio() {
  var input = document.getElementById('intercambio-input').value.toUpperCase();
  var tokens = input.split(/[\s,;\n]+/).filter(function(t){return t.length>0;});
  var sirven = [], noSirven = [];
  var i = 0;
  while(i < tokens.length) {
    if(i+1 < tokens.length && !isNaN(tokens[i+1])) {
      var prefix = tokens[i];
      var num = parseInt(tokens[i+1]);
      var fig = null;
      var c = null;
      // For FWC: search across both INTRO (FWC 1-8) and FWC History (FWC 9-19)
      if(prefix === 'FWC') {
        if(num >= 1 && num <= 8) {
          c = 'INTRO_'+(num-1);
        } else if(num >= 9 && num <= 19) {
          c = 'FWC_'+(num-9);
        }
        fig = c ? ALL.find(function(f){return f.id===c;}) : null;
      } else if(prefix === 'CC') {
        c = 'CC_'+(num-1);
        fig = ALL.find(function(f){return f.id===c;});
      } else {
        // Regular team sticker
        c = prefix+'_'+(num-1);
        fig = ALL.find(function(f){return f.id===c;});
      }
      if(fig) {
        if(!col[c]) sirven.push({id:c, nombre:fig.nombre});
        else noSirven.push({id:c, nombre:fig.nombre});
        i += 2;
      } else i++;
    } else i++;
  }
  var html = '';
  if(sirven.length > 0) {
    html += '<div style="background:#f0fdf4;border:2px solid #86efac;border-radius:10px;padding:12px;margin-bottom:10px"><div style="font-weight:800;color:#15803d;font-size:14px;margin-bottom:8px">Me sirven '+sirven.length+':</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
    sirven.forEach(function(f){html += '<span style="background:#dcfce7;border:1.5px solid #16a34a;color:#15803d;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:700">'+f.nombre+'</span>';});
    html += '</div></div>';
  }
  if(noSirven.length > 0) {
    html += '<div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:10px;padding:12px"><div style="font-weight:800;color:#dc2626;font-size:14px;margin-bottom:8px">Ya las tengo ('+noSirven.length+'):</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
    noSirven.forEach(function(f){html += '<span style="background:#fee2e2;border:1.5px solid #fca5a5;color:#dc2626;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:700">'+f.nombre+'</span>';});
    html += '</div></div>';
  }
  if(!sirven.length && !noSirven.length) html = '<div style="color:#888;font-size:13px;text-align:center;padding:16px">No encontre ninguna. Usa: ARG 17 ENG 5</div>';

  // Add WhatsApp share button if there are results
  if(sirven.length > 0) {
    var codigos = sirven.map(function(f){ return f.nombre; }).join(' ');
    html += '<button onclick="compartirSirven('+JSON.stringify(codigos)+')" style="width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;background:#25D366;color:#fff;font-weight:800;font-size:14px;cursor:pointer">Compartir por WhatsApp cuales me sirven</button>';
  }

  document.getElementById('intercambio-result').innerHTML = html;
}

function compartirSirven(lista) {
  var txt = 'Me sirven estas figuritas:\n\n' + lista.split(' ').join('\n');
  window.open('https://wa.me/?text='+encodeURIComponent(txt), '_blank');
}

function compartirRepetidas() {
  var list = ALL.filter(function(f){return (rep[f.id]||0)>0;});
  if(!list.length) { alert('No tenes repetidas cargadas todavia'); return; }
  var txt = 'MIS REPETIDAS PARA CAMBIAR\nRoad to FIFA World Cup 2026\n---\n';
  var gs = {};
  list.forEach(function(f) {
    var k = f.eqNombre||f.secNombre||'Especiales';
    if(!gs[k]) gs[k] = {nombre:k, items:[]};
    gs[k].items.push(f.nombre+' (x'+rep[f.id]+')');
  });
  Object.values(gs).forEach(function(g) {
    txt += '\n'+g.nombre+':\n';
    txt += g.items.map(function(i){return '  - '+i;}).join('\n') + '\n';
  });
  txt += '\n---\nTotal: '+list.length+' figuritas distintas';
  window.open('https://wa.me/?text='+encodeURIComponent(txt), '_blank');
}

}
